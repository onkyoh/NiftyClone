[[redirects]]
  from = "/image/*"
  to = "/.netlify/functions/image/:splat"
  status = 200

[[redirects]]
  from = "/"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

[build]
  command = "npm install"
  publish = "admin"

[functions]
  directory = "functions"
  node_bundler = "esbuild"
  external_node_modules = ["@napi-rs/canvas", "node-fetch"]
  included_files = ["node_modules/@napi-rs/**", "node_modules/node-fetch/**", "fonts/**", "admin/index.html"]
